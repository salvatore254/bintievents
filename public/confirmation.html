<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Payment Successful | Binti Tents & Events</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Your booking has been confirmed successfully." />
  <link rel="icon" type="image/png" href="images/logo1.png">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    .confirmation-container {
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .success-card {
      background: white;
      border-radius: 16px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      animation: slideInUp 0.6s ease-out;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      color: white;
      animation: scaleIn 0.5s ease-out 0.2s both;
    }

    .success-card h1 {
      color: #333;
      font-size: 2em;
      margin: 20px 0 10px;
      animation: fadeIn 0.5s ease-out 0.3s both;
    }

    .success-card p {
      color: #666;
      font-size: 1.05em;
      margin: 15px 0;
      line-height: 1.6;
      animation: fadeIn 0.5s ease-out 0.4s both;
    }

    .confirmation-details {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 24px;
      margin: 30px 0;
      text-align: left;
      border-left: 4px solid #4CAF50;
      animation: fadeIn 0.5s ease-out 0.5s both;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #999;
      font-weight: 600;
      font-size: 0.95em;
    }

    .detail-value {
      color: #333;
      font-weight: 600;
      word-break: break-word;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      animation: fadeIn 0.5s ease-out 0.6s both;
    }

    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      font-size: 1em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7851A9, #6b3fa0);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(120, 81, 169, 0.3);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #e0e0e0;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
      border-color: #d0d0d0;
    }

    .loading-state {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #7851A9;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.5);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .email-notice {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: 8px;
      padding: 16px;
      margin: 20px 0;
      color: #2e7d32;
      font-size: 0.95em;
      line-height: 1.6;
    }

    .email-notice i {
      margin-right: 10px;
      color: #4CAF50;
    }
  </style>

  <!-- API Configuration -->
  <script>
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      window.API_BASE_URL = 'http://localhost:5000/api';
    } else {
      window.API_BASE_URL = 'https://binti-events-backend.onrender.com/api';
    }
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container nav-container">
      <div class="logo"><a href="index.html"><img src="images/logo1.png" alt="Binti Logo"></a></div>
      <nav class="main-nav">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="privatepackages.html">Private Events</a></li>
          <li><a href="corporatepackages.html">Corporate Events</a></li>
          <li><a href="tents.html">Tents</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="gallery.html">Gallery</a></li>
        </ul>
      </nav>
      <button id="hamburger" class="hamburger">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </header>

  <section class="page-hero" style="background-image:url('images/well-dressed-table-26.jpg'); background-size: cover; background-position: center;">
    <div class="hero-overlay">
      <div class="container hero-content">
        <h1>Booking Confirmed</h1>
        <p class="lead">Your event is booked and ready to go!</p>
      </div>
    </div>
  </section>

  <main class="container">
    <div class="confirmation-container">
      <div id="content-placeholder">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading your confirmation details...</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>&copy; 2026 Binti Tents & Events. All rights reserved.</p>
      <ul class="footer-links">
        <li><a href="terms.html">Terms of Service</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    // Simple logging system
    const confirmationLog = {
      info: (section, msg, data) => console.log(`[${section}] ${msg}`, data || ''),
      warn: (section, msg, data) => console.warn(`[${section}] ${msg}`, data || ''),
      error: (section, msg, data) => console.error(`[${section}] ${msg}`, data || '')
    };

    function q(sel) {
      return document.querySelector(sel);
    }

    function safeGetItem(key) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : null;
      } catch (e) {
        console.error('Error parsing localStorage item:', key);
        return null;
      }
    }

    async function loadConfirmation() {
      try {
        confirmationLog.info('CONFIRMATION', 'Page loaded');

        // Get booking data from localStorage
        const booking = safeGetItem('bintiBooking');
        if (!booking) {
          confirmationLog.warn('CONFIRMATION', 'No booking found in localStorage');
          q('#content-placeholder').innerHTML = `
            <div class="success-card">
              <div style="background: #fff3cd; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px;">⚠️</div>
              <h1>Booking Details Not Found</h1>
              <p>We couldn't load your booking details.</p>
              <div class="action-buttons">
                <a href="bookings.html" class="btn-primary"><i class="fas fa-arrow-left"></i> Create New Booking</a>
              </div>
            </div>
          `;
          return;
        }

        confirmationLog.info('CONFIRMATION', 'Booking loaded', {
          fullname: booking.fullname,
          email: booking.email,
          total: booking.total
        });

        // Format event date
        let eventDateDisplay = 'Not specified';
        if (booking.eventDate) {
          try {
            const eventDate = new Date(booking.eventDate);
            eventDateDisplay = eventDate.toLocaleDateString('en-KE', {
              weekday: 'long',
              year: 'numeric',
              month: 'long',
              day: 'numeric'
            });
          } catch (e) {
            eventDateDisplay = booking.eventDate;
          }
        }

        // Render confirmation card
        const html = `
          <div class="success-card">
            <div class="success-icon">
              <i class="fas fa-check"></i>
            </div>
            <h1>Payment Successful!</h1>
            <p>Your booking has been confirmed and payment has been received.</p>
            
            <div class="email-notice">
              <i class="fas fa-envelope"></i>
              A confirmation email has been sent to <strong>${booking.email || 'your email'}</strong> with all the details.
            </div>

            <div class="confirmation-details">
              <div class="detail-row">
                <span class="detail-label">Booking Reference</span>
                <span class="detail-value">#${booking.id || 'BOOKING_' + Date.now()}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Name</span>
                <span class="detail-value">${booking.fullname || '—'}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Phone</span>
                <span class="detail-value">${booking.phone || '—'}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value">${booking.email || '—'}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Event Date</span>
                <span class="detail-value">${eventDateDisplay}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Setup Time</span>
                <span class="detail-value">${booking.setupTime || '—'}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Venue</span>
                <span class="detail-value">${booking.venue || '—'}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Final Amount Paid</span>
                <span class="detail-value">KES ${(booking.total || 0).toLocaleString()}</span>
              </div>
            </div>

            <p style="color: #666; font-size: 0.95em; margin-top: 20px;">
              <i class="fas fa-info-circle" style="color: #7851A9; margin-right: 8px;"></i>
              We'll contact you 7 days before your event to confirm final details and answer any questions.
            </p>

            <div class="action-buttons">
              <a href="index.html" class="btn-primary">
                <i class="fas fa-home"></i> Back to Home
              </a>
              <a href="contact.html" class="btn-secondary">
                <i class="fas fa-question-circle"></i> Have Questions?
              </a>
            </div>
          </div>
        `;

        q('#content-placeholder').innerHTML = html;
        confirmationLog.info('CONFIRMATION', 'Confirmation page rendered');
      } catch (error) {
        confirmationLog.error('CONFIRMATION', 'Error loading confirmation', error);
        q('#content-placeholder').innerHTML = `
          <div class="success-card">
            <div style="background: #ffebee; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px;">❌</div>
            <h1>Something Went Wrong</h1>
            <p>${error.message}</p>
            <div class="action-buttons">
              <a href="bookings.html" class="btn-primary">Create New Booking</a>
            </div>
          </div>
        `;
      }
    }

    // Load confirmation when page is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadConfirmation);
    } else {
      loadConfirmation();
    }
  </script>
</body>
</html>
